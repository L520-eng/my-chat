<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chat">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%236366f1' rx='20' width='100' height='100'/><text x='50' y='68' text-anchor='middle' fill='white' font-size='50'>💬</text></svg>">
<title>Chat</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f5f5f7;
  --card: #ffffff;
  --text: #1d1d1f;
  --text2: #86868b;
  --border: #e5e5ea;
  --primary: #6366f1;
  --primary-hover: #4f46e5;
  --user-bg: #6366f1;
  --assistant-bg: #ffffff;
  --input-bg: #ffffff;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #000000;
    --card: #1c1c1e;
    --text: #f5f5f7;
    --text2: #98989d;
    --border: #38383a;
    --primary: #818cf8;
    --primary-hover: #6366f1;
    --user-bg: #6366f1;
    --assistant-bg: #1c1c1e;
    --input-bg: #1c1c1e;
  }
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Top Bar */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  padding-top: max(12px, env(safe-area-inset-top));
  background: var(--card);
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
  z-index: 10;
}
.topbar-title {
  font-size: 17px;
  font-weight: 600;
  flex: 1;
  text-align: center;
}
.topbar-btn {
  background: none;
  border: none;
  font-size: 22px;
  cursor: pointer;
  padding: 4px 8px;
  color: var(--primary);
  -webkit-tap-highlight-color: transparent;
}
.topbar-center {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.model-label {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  max-width: 180px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.model-dropdown {
  font-size: 11px;
  color: var(--text2);
}

/* Chat Area */
.chat-area {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.chat-area:empty::after {
  content: '开始新的对话';
  color: var(--text2);
  margin: auto;
  font-size: 15px;
}

/* Messages */
.msg {
  display: flex;
  gap: 10px;
  max-width: 100%;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg.user { flex-direction: row-reverse; }
.msg-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  margin-top: 2px;
}
.msg.user .msg-avatar { background: var(--user-bg); color: white; }
.msg.assistant .msg-avatar { background: var(--border); }
.msg-bubble {
  padding: 10px 14px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.5;
  word-break: break-word;
  max-width: 80%;
  position: relative;
}
.msg.user .msg-bubble {
  background: var(--user-bg);
  color: white;
  border-bottom-right-radius: 4px;
}
.msg.assistant .msg-bubble {
  background: var(--assistant-bg);
  border: 0.5px solid var(--border);
  border-bottom-left-radius: 4px;
}
.msg-bubble img.msg-img {
  max-width: 200px;
  border-radius: 12px;
  margin-bottom: 6px;
  display: block;
}
.msg-bubble pre {
  background: rgba(0,0,0,0.06);
  border-radius: 8px;
  padding: 10px;
  overflow-x: auto;
  font-size: 13px;
  margin: 6px 0;
}
.msg-bubble code {
  font-family: "SF Mono", Menlo, monospace;
  font-size: 13px;
}
.msg-bubble p { margin: 0 0 6px; }
.msg-bubble p:last-child { margin-bottom: 0; }
.msg-bubble ul, .msg-bubble ol { margin: 4px 0; padding-left: 20px; }
.msg-bubble a { color: #60a5fa; }
.msg-actions {
  display: flex;
  gap: 8px;
  margin-top: 6px;
}
.msg-action-btn {
  font-size: 12px;
  color: var(--text2);
  background: none;
  border: none;
  cursor: pointer;
  padding: 2px 4px;
}

/* Typing indicator */
.typing { display: flex; gap: 4px; padding: 4px 0; }
.typing span {
  width: 6px; height: 6px;
  background: var(--text2);
  border-radius: 50%;
  animation: bounce 1.4s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
}

/* Input Area */
.input-area {
  background: var(--card);
  border-top: 0.5px solid var(--border);
  padding: 8px 12px;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
  flex-shrink: 0;
}
.input-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
}
.input-wrapper {
  flex: 1;
  background: var(--input-bg);
  border: 0.5px solid var(--border);
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.input-images {
  display: flex;
  gap: 6px;
  padding: 8px 12px 0;
  flex-wrap: wrap;
}
.input-img-thumb {
  width: 48px;
  height: 48px;
  border-radius: 8px;
  object-fit: cover;
  position: relative;
}
.input-img-wrap {
  position: relative;
  display: inline-block;
}
.input-img-remove {
  position: absolute;
  top: -4px;
  right: -4px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: rgba(0,0,0,0.6);
  color: white;
  border: none;
  font-size: 11px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}
#msgInput {
  width: 100%;
  border: none;
  outline: none;
  background: transparent;
  font-size: 16px;
  padding: 10px 14px;
  color: var(--text);
  resize: none;
  min-height: 40px;
  max-height: 120px;
  font-family: inherit;
  line-height: 1.4;
}
#msgInput::placeholder { color: var(--text2); }
.tool-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: var(--text2);
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.send-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: var(--primary);
  color: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
  transition: opacity 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.send-btn:disabled { opacity: 0.4; }
.send-btn.stop { background: #ef4444; }

/* Settings Panel */
.settings-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 100;
  display: none;
  opacity: 0;
  transition: opacity 0.2s;
}
.settings-overlay.open { display: block; opacity: 1; }
.settings-panel {
  position: fixed;
  top: 0;
  right: 0;
  width: min(360px, 100vw);
  height: 100%;
  background: var(--card);
  z-index: 101;
  transform: translateX(100%);
  transition: transform 0.3s ease;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.settings-panel.open { transform: translateX(0); }
.settings-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px;
  padding-top: max(16px, env(safe-area-inset-top));
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
}
.settings-header h2 { font-size: 17px; font-weight: 600; }
.settings-close {
  background: none;
  border: none;
  font-size: 24px;
  cursor: pointer;
  color: var(--text2);
  padding: 4px;
}
.settings-body {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px;
}
.setting-group {
  margin-bottom: 24px;
}
.setting-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}
.setting-input {
  width: 100%;
  padding: 10px 12px;
  border: 0.5px solid var(--border);
  border-radius: 10px;
  font-size: 15px;
  background: var(--bg);
  color: var(--text);
  outline: none;
  font-family: inherit;
}
.setting-input:focus { border-color: var(--primary); }
.setting-textarea {
  width: 100%;
  padding: 10px 12px;
  border: 0.5px solid var(--border);
  border-radius: 10px;
  font-size: 14px;
  background: var(--bg);
  color: var(--text);
  outline: none;
  font-family: inherit;
  min-height: 80px;
  resize: vertical;
}
.setting-hint {
  font-size: 12px;
  color: var(--text2);
  margin-top: 4px;
}
.model-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.model-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  border: 0.5px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: border-color 0.15s;
}
.model-item.active { border-color: var(--primary); background: rgba(99,102,241,0.06); }
.model-item-name { font-size: 15px; }
.model-item-check { color: var(--primary); font-size: 18px; }
.setting-btn {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  margin-top: 8px;
}
.btn-primary { background: var(--primary); color: white; }
.btn-danger { background: #ef4444; color: white; }
.btn-secondary {
  background: var(--bg);
  color: var(--text);
  border: 0.5px solid var(--border);
}

/* Model picker dropdown */
.model-picker {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.4);
  z-index: 90;
  display: none;
  align-items: flex-end;
  justify-content: center;
}
.model-picker.open { display: flex; }
.model-picker-sheet {
  background: var(--card);
  border-radius: 16px 16px 0 0;
  width: 100%;
  max-height: 60vh;
  display: flex;
  flex-direction: column;
  animation: slideUp 0.25s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.model-picker-handle {
  width: 36px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 8px auto;
}
.model-picker-title {
  text-align: center;
  font-size: 17px;
  font-weight: 600;
  padding: 8px 16px 12px;
}
.model-picker-list {
  overflow-y: auto;
  padding: 0 16px 16px;
  -webkit-overflow-scrolling: touch;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: var(--bg);
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 14px;
  z-index: 200;
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <button class="topbar-btn" onclick="newChat()" title="新对话">＋</button>
  <div class="topbar-center" onclick="openModelPicker()">
    <span class="model-label" id="modelName">设置模型</span>
    <span class="model-dropdown">▾</span>
  </div>
  <button class="topbar-btn" onclick="openSettings()">⚙</button>
</div>

<!-- Chat Area -->
<div class="chat-area" id="chatArea"></div>

<!-- Input Area -->
<div class="input-area">
  <div class="input-wrapper">
    <div class="input-images" id="imagePreview" style="display:none"></div>
    <div class="input-row">
      <textarea id="msgInput" rows="1" placeholder="输入消息..."
        oninput="autoResize(this)"></textarea>
    </div>
  </div>
  <div class="input-row" style="justify-content:center;margin-top:6px">
    <button class="tool-btn" onclick="pickImage()" title="上传图片">🖼</button>
    <button class="tool-btn" onclick="pickFile()" title="上传文件">📎</button>
    <input type="file" id="imgPicker" accept="image/*" multiple style="display:none" onchange="handleImages(this)">
    <input type="file" id="filePicker" accept=".txt,.md,.json,.csv,.pdf,.doc,.docx" style="display:none" onchange="handleFile(this)">
    <button class="send-btn" id="sendBtn" onclick="handleSend()" title="发送">↑</button>
  </div>
</div>

<!-- Settings -->
<div class="settings-overlay" id="settingsOverlay" onclick="closeSettings()"></div>
<div class="settings-panel" id="settingsPanel">
  <div class="settings-header">
    <h2>设置</h2>
    <button class="settings-close" onclick="closeSettings()">✕</button>
  </div>
  <div class="settings-body">
    <div class="setting-group">
      <div class="setting-label">API 地址</div>
      <input class="setting-input" id="apiUrl" placeholder="https://your-api.com/v1" oninput="saveSettings()">
      <div class="setting-hint">不需要包含 /chat/completions，末尾加不加 / 都行</div>
    </div>
    <div class="setting-group">
      <div class="setting-label">API Key</div>
      <input class="setting-input" id="apiKey" type="password" placeholder="sk-xxx" oninput="saveSettings()">
    </div>
    <div class="setting-group">
      <div class="setting-label">模型列表（每行一个）</div>
      <textarea class="setting-textarea" id="modelList" placeholder="claude-opus-4-6&#10;gpt-4o&#10;gemini-2.5-pro" oninput="saveSettings()"></textarea>
      <div class="setting-hint">填你中转站支持的模型 ID</div>
    </div>
    <div class="setting-group">
      <div class="setting-label">系统提示词（可选）</div>
      <textarea class="setting-textarea" id="systemPrompt" placeholder="你是一个有帮助的助手。" oninput="saveSettings()"></textarea>
    </div>
    <div class="setting-group">
      <button class="setting-btn btn-secondary" onclick="testConnection()">测试连接</button>
      <button class="setting-btn btn-danger" onclick="clearAll()">清空所有对话</button>
    </div>
  </div>
</div>

<!-- Model Picker -->
<div class="model-picker" id="modelPicker" onclick="closeModelPicker(event)">
  <div class="model-picker-sheet" onclick="event.stopPropagation()">
    <div class="model-picker-handle"></div>
    <div class="model-picker-title">选择模型</div>
    <div class="model-picker-list" id="modelPickerList"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// State
let messages = [];
let attachedImages = [];
let currentModel = '';
let isStreaming = false;
let abortController = null;

// Init
window.addEventListener('DOMContentLoaded', () => {
  loadSettings();
  loadChat();
  document.getElementById('msgInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });
});

// Settings
function loadSettings() {
  const s = JSON.parse(localStorage.getItem('chat_settings') || '{}');
  document.getElementById('apiUrl').value = s.apiUrl || '';
  document.getElementById('apiKey').value = s.apiKey || '';
  document.getElementById('modelList').value = s.modelList || '';
  document.getElementById('systemPrompt').value = s.systemPrompt || '';
  currentModel = s.currentModel || '';
  updateModelName();
}

function saveSettings() {
  const s = {
    apiUrl: document.getElementById('apiUrl').value.trim(),
    apiKey: document.getElementById('apiKey').value.trim(),
    modelList: document.getElementById('modelList').value.trim(),
    systemPrompt: document.getElementById('systemPrompt').value.trim(),
    currentModel
  };
  localStorage.setItem('chat_settings', JSON.stringify(s));
}

function getModels() {
  return document.getElementById('modelList').value.trim().split('\n').map(m => m.trim()).filter(Boolean);
}

function updateModelName() {
  const el = document.getElementById('modelName');
  el.textContent = currentModel || '选择模型';
}

// Panels
function openSettings() {
  document.getElementById('settingsOverlay').classList.add('open');
  document.getElementById('settingsPanel').classList.add('open');
}
function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('open');
  document.getElementById('settingsPanel').classList.remove('open');
}

function openModelPicker() {
  const models = getModels();
  const list = document.getElementById('modelPickerList');
  list.innerHTML = models.length === 0
    ? '<div style="text-align:center;color:var(--text2);padding:24px">请先在设置中添加模型</div>'
    : models.map(m => `
      <div class="model-item ${m === currentModel ? 'active' : ''}" onclick="selectModel('${m}')">
        <span class="model-item-name">${m}</span>
        ${m === currentModel ? '<span class="model-item-check">✓</span>' : ''}
      </div>
    `).join('');
  document.getElementById('modelPicker').classList.add('open');
}
function closeModelPicker(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('modelPicker').classList.remove('open');
}
function selectModel(m) {
  currentModel = m;
  updateModelName();
  saveSettings();
  closeModelPicker({ target: document.getElementById('modelPicker'), currentTarget: document.getElementById('modelPicker') });
}

// Chat persistence
function loadChat() {
  messages = JSON.parse(localStorage.getItem('chat_messages') || '[]');
  renderMessages();
}
function saveChat() {
  localStorage.setItem('chat_messages', JSON.stringify(messages));
}

// New chat
function newChat() {
  messages = [];
  attachedImages = [];
  saveChat();
  renderMessages();
  document.getElementById('imagePreview').style.display = 'none';
  document.getElementById('imagePreview').innerHTML = '';
  document.getElementById('chatArea').scrollTop = 0;
}

// Render
function renderMessages() {
  const area = document.getElementById('chatArea');
  area.innerHTML = messages.map((m, i) => renderMsg(m, i)).join('');
  scrollToBottom();
}

function renderMsg(m, index) {
  const isUser = m.role === 'user';
  let content = '';
  if (m.images && m.images.length) {
    content += m.images.map(src => `<img class="msg-img" src="${src}">`).join('');
  }
  if (m.content) {
    content += formatText(m.content);
  }
  const actions = !isUser && index === messages.length - 1 ? `
    <div class="msg-actions">
      <button class="msg-action-btn" onclick="copyMsg(${index})">复制</button>
    </div>
  ` : '';
  return `
    <div class="msg ${m.role}">
      <div class="msg-avatar">${isUser ? '我' : '✦'}</div>
      <div>
        <div class="msg-bubble">${content}</div>
        ${actions}
      </div>
    </div>
  `;
}

function formatText(text) {
  if (!text) return '';
  // Code blocks
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    return `<pre><code>${escapeHtml(code.trim())}</code></pre>`;
  });
  // Inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Links
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  // Line breaks → paragraphs
  text = text.split('\n\n').map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
  return text;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function scrollToBottom() {
  const area = document.getElementById('chatArea');
  requestAnimationFrame(() => { area.scrollTop = area.scrollHeight; });
}

function copyMsg(i) {
  navigator.clipboard.writeText(messages[i].content || '').then(() => showToast('已复制'));
}

// Image upload
function pickImage() { document.getElementById('imgPicker').click(); }
function pickFile() { document.getElementById('filePicker').click(); }

function handleImages(input) {
  const files = Array.from(input.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      attachedImages.push(e.target.result);
      renderImagePreviews();
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function renderImagePreviews() {
  const el = document.getElementById('imagePreview');
  if (attachedImages.length === 0) {
    el.style.display = 'none';
    el.innerHTML = '';
    return;
  }
  el.style.display = 'flex';
  el.innerHTML = attachedImages.map((src, i) => `
    <div class="input-img-wrap">
      <img class="input-img-thumb" src="${src}">
      <button class="input-img-remove" onclick="removeImage(${i})">✕</button>
    </div>
  `).join('');
}

function removeImage(i) {
  attachedImages.splice(i, 1);
  renderImagePreviews();
}

// File upload
function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const text = e.target.result;
    const content = `[文件: ${file.name}]\n\n${text}`;
    document.getElementById('msgInput').value = content;
    autoResize(document.getElementById('msgInput'));
  };
  reader.readAsText(file);
  input.value = '';
}

// Auto resize textarea
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// Send
async function handleSend() {
  if (isStreaming) {
    stopStream();
    return;
  }

  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text && attachedImages.length === 0) return;

  const apiUrl = document.getElementById('apiUrl').value.trim();
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiUrl || !apiKey) {
    showToast('请先在设置中填写 API 地址和 Key');
    openSettings();
    return;
  }
  if (!currentModel) {
    showToast('请先选择模型');
    openModelPicker();
    return;
  }

  // Build user message
  const userMsg = { role: 'user', content: text };
  if (attachedImages.length > 0) {
    userMsg.images = [...attachedImages];
  }
  messages.push(userMsg);
  input.value = '';
  autoResize(input);
  attachedImages = [];
  renderImagePreviews();
  saveChat();
  renderMessages();

  // Stream response
  isStreaming = true;
  updateSendBtn();
  abortController = new AbortController();

  try {
    const baseUrl = apiUrl.replace(/\/+$/, '');
    const url = `${baseUrl}/chat/completions`;

    // Build request messages
    const reqMessages = [];
    const sysPrompt = document.getElementById('systemPrompt').value.trim();
    if (sysPrompt) {
      reqMessages.push({ role: 'system', content: sysPrompt });
    }
    for (const m of messages) {
      if (m.images && m.images.length > 0) {
        const content = [];
        if (m.content) content.push({ type: 'text', text: m.content });
        for (const img of m.images) {
          content.push({ type: 'image_url', image_url: { url: img } });
        }
        reqMessages.push({ role: m.role, content });
      } else {
        reqMessages.push({ role: m.role, content: m.content });
      }
    }

    const resp = await fetch(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: currentModel,
        messages: reqMessages,
        stream: true
      }),
      signal: abortController.signal
    });

    if (!resp.ok) {
      const errText = await resp.text();
      throw new Error(`API ${resp.status}: ${errText}`);
    }

    // Add assistant message placeholder
    messages.push({ role: 'assistant', content: '' });
    saveChat();
    renderMessages();

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed || !trimmed.startsWith('data: ')) continue;
        const data = trimmed.slice(6);
        if (data === '[DONE]') continue;
        try {
          const json = JSON.parse(data);
          const delta = json.choices?.[0]?.delta?.content;
          if (delta) {
            messages[messages.length - 1].content += delta;
            renderStreaming();
          }
        } catch {}
      }
    }
    saveChat();
  } catch (e) {
    if (e.name === 'AbortError') {
      saveChat();
    } else {
      // Remove empty assistant message if it failed
      if (messages.length > 0 && messages[messages.length - 1].role === 'assistant' && !messages[messages.length - 1].content) {
        messages.pop();
      }
      showToast(e.message || '请求失败');
      saveChat();
    }
  } finally {
    isStreaming = false;
    abortController = null;
    renderMessages();
    updateSendBtn();
  }
}

function renderStreaming() {
  const area = document.getElementById('chatArea');
  const lastMsg = messages[messages.length - 1];
  if (!lastMsg || lastMsg.role !== 'assistant') return;

  // Find or create last message element
  let msgEl = area.querySelector('.msg.assistant:last-child');
  if (!msgEl) {
    renderMessages();
    return;
  }
  const bubble = msgEl.querySelector('.msg-bubble');
  if (bubble) {
    bubble.innerHTML = formatText(lastMsg.content);
  }
  scrollToBottom();
}

function stopStream() {
  if (abortController) {
    abortController.abort();
  }
}

function updateSendBtn() {
  const btn = document.getElementById('sendBtn');
  if (isStreaming) {
    btn.innerHTML = '■';
    btn.classList.add('stop');
    btn.disabled = false;
  } else {
    btn.innerHTML = '↑';
    btn.classList.remove('stop');
    btn.disabled = false;
  }
}

// Test connection
async function testConnection() {
  const apiUrl = document.getElementById('apiUrl').value.trim();
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiUrl || !apiKey) {
    showToast('请先填写 API 地址和 Key');
    return;
  }
  const models = getModels();
  const model = currentModel || models[0] || 'gpt-3.5-turbo';
  try {
    const baseUrl = apiUrl.replace(/\/+$/, '');
    const resp = await fetch(`${baseUrl}/chat/completions`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model,
        messages: [{ role: 'user', content: 'hi' }],
        max_tokens: 5
      })
    });
    if (resp.ok) {
      showToast('连接成功 ✓');
    } else {
      const t = await resp.text();
      showToast(`连接失败: ${resp.status}`);
    }
  } catch (e) {
    showToast(`连接失败: ${e.message}`);
  }
}

// Clear all
function clearAll() {
  if (!confirm('确定清空所有对话？')) return;
  messages = [];
  saveChat();
  renderMessages();
  showToast('已清空');
}

// Toast
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}
</script>

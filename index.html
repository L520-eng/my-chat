<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chat">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%236366f1' rx='20' width='100' height='100'/><text x='50' y='68' text-anchor='middle' fill='white' font-size='50'>💬</text></svg>">
<title>Chat</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f5f5f7;
  --card: #ffffff;
  --text: #1d1d1f;
  --text2: #86868b;
  --border: #e5e5ea;
  --primary: #6366f1;
  --user-bg: #6366f1;
  --assistant-bg: #ffffff;
  --input-bg: #ffffff;
  --sidebar-bg: #f5f5f7;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #000000;
    --card: #1c1c1e;
    --text: #f5f5f7;
    --text2: #98989d;
    --border: #38383a;
    --primary: #818cf8;
    --user-bg: #6366f1;
    --assistant-bg: #1c1c1e;
    --input-bg: #1c1c1e;
    --sidebar-bg: #1c1c1e;
  }
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh; height: 100dvh;
  display: flex; flex-direction: column;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  position: fixed; width: 100%; top: 0;
  touch-action: manipulation;
}

/* Sidebar */
.sidebar-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 200;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.sidebar-overlay.open { opacity: 1; pointer-events: auto; }
.sidebar {
  position: fixed; top: 0; left: 0;
  width: min(300px, 80vw); height: 100%;
  background: var(--sidebar-bg);
  z-index: 201;
  transform: translateX(-100%);
  transition: transform 0.25s ease;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.sidebar.open { transform: translateX(0); }
.sidebar-header {
  padding: 16px;
  padding-top: max(16px, env(safe-area-inset-top));
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
}
.sidebar-header h2 { font-size: 18px; font-weight: 700; }
.sidebar-new-btn {
  width: 36px; height: 36px;
  border-radius: 10px;
  border: 0.5px solid var(--border);
  background: var(--card);
  font-size: 20px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--primary);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.sidebar-list {
  flex: 1; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 8px;
}
.sidebar-item {
  padding: 12px 14px;
  border-radius: 10px;
  cursor: pointer;
  margin-bottom: 2px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 8px;
  transition: background 0.15s;
}
.sidebar-item:active { background: rgba(99,102,241,0.1); }
.sidebar-item.active { background: rgba(99,102,241,0.12); }
.sidebar-item-info { flex: 1; min-width: 0; }
.sidebar-item-title {
  font-size: 15px; font-weight: 500;
  overflow: hidden; text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--text);
}
.sidebar-item-time {
  font-size: 12px; color: var(--text2);
  margin-top: 3px;
}
.sidebar-item-delete {
  flex-shrink: 0;
  width: 28px; height: 28px;
  border-radius: 6px;
  border: none; background: none;
  color: var(--text2); font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
  transition: opacity 0.15s;
  touch-action: manipulation;
}
.sidebar-item:hover .sidebar-item-delete,
.sidebar-item:active .sidebar-item-delete { opacity: 1; }
.sidebar-empty {
  text-align: center; color: var(--text2);
  padding: 40px 20px; font-size: 14px;
}

/* Top Bar */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 8px;
  padding-top: max(10px, env(safe-area-inset-top));
  background: var(--card);
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0; z-index: 10;
}
.topbar-btn {
  background: none; border: none;
  font-size: 22px; cursor: pointer;
  padding: 8px;
  min-width: 44px; min-height: 44px;
  display: flex; align-items: center; justify-content: center;
  color: var(--primary);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  -webkit-user-select: none; user-select: none;
}
.topbar-center {
  display: flex; align-items: center; gap: 4px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  padding: 8px 12px;
  -webkit-user-select: none; user-select: none;
  touch-action: manipulation;
}
.model-label {
  font-size: 15px; font-weight: 600;
  color: var(--text);
  max-width: 160px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.model-dropdown { font-size: 11px; color: var(--text2); }

/* Chat Area */
.chat-area {
  flex: 1; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px;
  display: flex; flex-direction: column; gap: 16px;
}
.chat-area:empty::after {
  content: '开始新的对话';
  color: var(--text2); margin: auto; font-size: 15px;
}

/* Messages */
.msg {
  display: flex; gap: 10px;
  max-width: 100%;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg.user { flex-direction: row-reverse; }
.msg-avatar {
  width: 32px; height: 32px;
  border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; margin-top: 2px;
}
.msg.user .msg-avatar { background: var(--user-bg); color: white; }
.msg.assistant .msg-avatar { background: var(--border); }
.msg-bubble {
  padding: 10px 14px;
  border-radius: 18px;
  font-size: 15px; line-height: 1.5;
  word-break: break-word;
  max-width: 75%; position: relative;
  min-width: 40px;
}
.msg.user .msg-bubble {
  background: var(--user-bg); color: white;
  border-bottom-right-radius: 4px;
}
.msg.assistant .msg-bubble {
  background: var(--assistant-bg);
  border: 0.5px solid var(--border);
  border-bottom-left-radius: 4px;
}
.msg-bubble img.msg-img {
  max-width: 200px; border-radius: 12px;
  margin-bottom: 6px; display: block;
}
.msg-bubble pre {
  background: rgba(0,0,0,0.06);
  border-radius: 8px; padding: 10px;
  overflow-x: auto; font-size: 13px; margin: 6px 0;
}
.msg-bubble code {
  font-family: "SF Mono", Menlo, monospace; font-size: 13px;
}
.msg-bubble p { margin: 0 0 6px; }
.msg-bubble p:last-child { margin-bottom: 0; }
.msg-bubble ul, .msg-bubble ol { margin: 4px 0; padding-left: 20px; }
.msg-bubble a { color: #60a5fa; }
.msg-actions {
  display: flex; gap: 8px; margin-top: 6px;
}
.msg-action-btn {
  font-size: 12px; color: var(--text2);
  background: none; border: none;
  cursor: pointer; padding: 4px 8px;
  touch-action: manipulation;
}

/* Input Area */
.input-area {
  background: var(--card);
  border-top: 0.5px solid var(--border);
  padding: 8px 8px;
  padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
  flex-shrink: 0;
  position: relative;
}
.input-images {
  display: flex; gap: 6px;
  padding: 6px 8px; flex-wrap: wrap;
}
.input-bar {
  display: flex; align-items: flex-end; gap: 4px;
}
.input-icon-btn {
  width: 40px; height: 40px; flex-shrink: 0;
  border-radius: 50%; border: none;
  background: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text2);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: color 0.15s;
}
.input-icon-btn:active { color: var(--primary); }
.input-icon-btn.send-mode { color: var(--primary); }
.input-wrapper {
  flex: 1; min-width: 0;
  background: var(--input-bg);
  border: 0.5px solid var(--border);
  border-radius: 20px;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.input-images {
  display: flex; gap: 6px;
  padding: 8px 12px 0; flex-wrap: wrap;
}
.input-img-thumb {
  width: 48px; height: 48px;
  border-radius: 8px; object-fit: cover;
}
.input-img-wrap { position: relative; display: inline-block; }
.input-img-remove {
  position: absolute; top: -4px; right: -4px;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: rgba(0,0,0,0.6); color: white;
  border: none; font-size: 11px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
#msgInput {
  width: 100%; border: none; outline: none;
  background: transparent; font-size: 16px;
  padding: 10px 14px; color: var(--text);
  resize: none; min-height: 40px; max-height: 120px;
  font-family: inherit; line-height: 1.4;
}
#msgInput::placeholder { color: var(--text2); }

/* Settings Panel */
.settings-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 300;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}
.settings-overlay.open { opacity: 1; pointer-events: auto; }
.settings-panel {
  position: fixed; top: 0; right: 0;
  width: min(360px, 100vw); height: 100%;
  background: var(--card);
  z-index: 301;
  transform: translateX(100%);
  transition: transform 0.3s ease;
  display: flex; flex-direction: column; overflow: hidden;
}
.settings-panel.open { transform: translateX(0); }
.settings-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px;
  padding-top: max(16px, env(safe-area-inset-top));
  border-bottom: 0.5px solid var(--border); flex-shrink: 0;
}
.settings-header h2 { font-size: 17px; font-weight: 600; }
.settings-close {
  background: none; border: none;
  font-size: 24px; cursor: pointer;
  color: var(--text2); padding: 8px;
  min-width: 44px; min-height: 44px;
  display: flex; align-items: center; justify-content: center;
  touch-action: manipulation;
}
.settings-body {
  flex: 1; overflow-y: auto;
  -webkit-overflow-scrolling: touch; padding: 16px;
}
.setting-group { margin-bottom: 24px; }
.setting-label {
  font-size: 13px; font-weight: 600; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;
}
.setting-input {
  width: 100%; padding: 10px 12px;
  border: 0.5px solid var(--border); border-radius: 10px;
  font-size: 15px; background: var(--bg); color: var(--text);
  outline: none; font-family: inherit;
}
.setting-input:focus { border-color: var(--primary); }
.setting-textarea {
  width: 100%; padding: 10px 12px;
  border: 0.5px solid var(--border); border-radius: 10px;
  font-size: 14px; background: var(--bg); color: var(--text);
  outline: none; font-family: inherit;
  min-height: 80px; resize: vertical;
}
.setting-hint { font-size: 12px; color: var(--text2); margin-top: 4px; }
.setting-btn {
  width: 100%; padding: 12px;
  border: none; border-radius: 10px;
  font-size: 15px; font-weight: 600;
  cursor: pointer; margin-top: 8px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.btn-primary { background: var(--primary); color: white; }

/* API Cards */
.api-card {
  padding: 12px;
  border: 0.5px solid var(--border);
  border-radius: 12px;
  margin-bottom: 8px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: border-color 0.15s, background 0.15s;
}
.api-card:active { background: rgba(99,102,241,0.04); }
.api-card.active { border-color: var(--primary); background: rgba(99,102,241,0.06); }
.api-card-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 4px;
}
.api-card-name {
  font-size: 15px; font-weight: 600;
  display: flex; align-items: center; gap: 6px;
}
.api-card-badge {
  font-size: 11px; padding: 1px 6px;
  border-radius: 4px; font-weight: 500;
  background: var(--primary); color: white;
}
.api-card-actions {
  display: flex; gap: 4px;
}
.api-card-btn {
  width: 28px; height: 28px;
  border-radius: 6px; border: none;
  background: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text2); font-size: 14px;
  touch-action: manipulation;
}
.api-card-btn:active { color: var(--text); }
.api-card-url {
  font-size: 12px; color: var(--text2);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.api-card-balance {
  font-size: 12px; color: var(--text2);
  margin-top: 4px;
  display: flex; align-items: center; gap: 4px;
}
.api-card-balance .balance-ok { color: #34c759; }
.api-card-balance .balance-low { color: #ff9500; }
.api-card-balance .balance-err { color: #ff3b30; }

/* API Edit Sheet */
.api-edit-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 350;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}
.api-edit-overlay.open { opacity: 1; pointer-events: auto; }
.api-edit-sheet {
  position: fixed; left: 0; right: 0; bottom: 0;
  background: var(--card);
  border-radius: 16px 16px 0 0;
  z-index: 351;
  transform: translateY(100%);
  transition: transform 0.3s ease;
  padding: 0 16px 16px;
  padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px));
  max-height: 85vh;
  overflow-y: auto;
}
.api-edit-sheet.open { transform: translateY(0); }
.api-edit-title {
  text-align: center; font-size: 17px; font-weight: 600;
  padding: 12px 0 16px;
}
.api-edit-body { }
.api-edit-actions {
  display: flex; gap: 8px; margin-top: 8px;
}
.api-edit-actions .setting-btn { flex: 1; }

/* Model Check List */
.model-check-list {
  display: flex; flex-direction: column; gap: 4px;
  max-height: 300px; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.model-check-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border: 0.5px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: border-color 0.15s;
}
.model-check-item.checked { border-color: var(--primary); background: rgba(99,102,241,0.06); }
.model-check-box {
  width: 20px; height: 20px;
  border-radius: 6px;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
  font-size: 12px; color: white;
}
.model-check-item.checked .model-check-box {
  background: var(--primary); border-color: var(--primary);
}
.model-check-name {
  font-size: 14px; flex: 1;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.model-check-delete {
  width: 24px; height: 24px;
  border: none; background: none;
  color: var(--text2); font-size: 14px;
  cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.15s;
  touch-action: manipulation;
}
.model-check-item:active .model-check-delete { opacity: 1; }
.model-list-empty {
  text-align: center; color: var(--text2);
  padding: 20px; font-size: 14px;
}
.model-list-actions { display: flex; gap: 8px; }
.model-list-actions .setting-btn { flex: 1; }
.btn-danger { background: #ef4444; color: white; }
.btn-secondary { background: var(--bg); color: var(--text); border: 0.5px solid var(--border); }

/* Model Picker */
.model-picker {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4);
  z-index: 250;
  display: none; align-items: flex-end; justify-content: center;
}
.model-picker.open { display: flex; }
.model-picker-sheet {
  background: var(--card);
  border-radius: 16px 16px 0 0;
  width: 100%; max-height: 60vh;
  display: flex; flex-direction: column;
  animation: slideUp 0.25s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.model-picker-handle {
  width: 36px; height: 4px;
  background: var(--border); border-radius: 2px;
  margin: 8px auto;
}
.model-picker-title {
  text-align: center; font-size: 17px; font-weight: 600;
  padding: 8px 16px 12px;
}
.model-picker-list {
  overflow-y: auto; padding: 0 16px 16px;
  -webkit-overflow-scrolling: touch;
}
.model-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px;
  border: 0.5px solid var(--border); border-radius: 10px;
  cursor: pointer; margin-bottom: 4px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.model-item:active { background: rgba(99,102,241,0.06); }
.model-item.active { border-color: var(--primary); background: rgba(99,102,241,0.06); }
.model-item-name { font-size: 15px; }
.model-item-check { color: var(--primary); font-size: 18px; }

/* Plus Menu */
.plus-menu {
  position: absolute;
  bottom: 100%;
  left: 8px;
  background: var(--card);
  border: 0.5px solid var(--border);
  border-radius: 14px;
  padding: 8px;
  display: none;
  gap: 4px;
  flex-direction: row;
  box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  z-index: 50;
  animation: fadeInUp 0.15s ease;
}
.plus-menu.open { display: flex; }
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.plus-menu-item {
  display: flex; flex-direction: column;
  align-items: center; gap: 4px;
  padding: 10px 16px;
  border-radius: 10px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  min-width: 64px;
}
.plus-menu-item:active { background: rgba(99,102,241,0.08); }
.plus-menu-icon {
  width: 48px; height: 48px;
  border-radius: 14px;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  color: var(--primary);
}
.plus-menu-item span {
  font-size: 12px; color: var(--text2);
}

/* Voice Overlay */
.voice-overlay {
  position: absolute;
  inset: 0;
  background: var(--card);
  display: none;
  align-items: center; justify-content: center;
  z-index: 60;
  border-top: 0.5px solid var(--border);
}
.voice-overlay.active { display: flex; }
.voice-indicator {
  display: flex; flex-direction: column;
  align-items: center; gap: 12px;
}
.voice-waves {
  display: flex; align-items: center;
  gap: 4px; height: 40px;
}
.voice-waves span {
  width: 4px; border-radius: 2px;
  background: var(--primary);
  animation: voiceWave 0.8s ease-in-out infinite;
}
.voice-waves span:nth-child(1) { height: 12px; animation-delay: 0s; }
.voice-waves span:nth-child(2) { height: 24px; animation-delay: 0.1s; }
.voice-waves span:nth-child(3) { height: 36px; animation-delay: 0.2s; }
.voice-waves span:nth-child(4) { height: 24px; animation-delay: 0.3s; }
.voice-waves span:nth-child(5) { height: 12px; animation-delay: 0.4s; }
@keyframes voiceWave {
  0%, 100% { transform: scaleY(0.5); }
  50% { transform: scaleY(1); }
}
.voice-text { font-size: 14px; color: var(--text2); }

/* Toast */
.toast {
  position: fixed; bottom: 100px;
  left: 50%; transform: translateX(-50%);
  background: var(--text); color: var(--bg);
  padding: 10px 20px; border-radius: 20px;
  font-size: 14px; z-index: 400;
  opacity: 0; transition: opacity 0.2s;
  pointer-events: none;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h2>对话</h2>
    <button class="sidebar-new-btn" id="sidebarNewBtn">＋</button>
  </div>
  <div class="sidebar-list" id="sidebarList"></div>
</div>

<!-- Top Bar -->
<div class="topbar">
  <button class="topbar-btn" id="menuBtn">☰</button>
  <div class="topbar-center" id="modelPickerBtn">
    <span class="model-label" id="modelName">选择模型</span>
    <span class="model-dropdown">▾</span>
  </div>
  <button class="topbar-btn" id="settingsBtn">⚙</button>
</div>

<!-- Chat Area -->
<div class="chat-area" id="chatArea"></div>

<!-- Input Area -->
<div class="input-area">
  <div class="input-images" id="imagePreview" style="display:none"></div>
  <div class="input-bar">
    <button class="input-icon-btn" id="cameraBtn" title="拍照">

<script>
// ==================== State ====================
let conversations = [];
let currentConvId = null;
let attachedImages = [];
let currentModel = '';
let isStreaming = false;
let abortController = null;
let apiConfigs = []; // [{name, url, key}]
let activeApiIndex = 0;
let editingApiIndex = -1; // -1 = new
let enabledModels = []; // array of model IDs

// ==================== Init ====================
document.addEventListener('DOMContentLoaded', () => {
  loadData();
  bindEvents();
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', () => scrollToBottom());
  }
});

// ==================== Event Binding ====================
function bindEvents() {
  // Top bar
  document.getElementById('menuBtn').addEventListener('click', openSidebar);
  document.getElementById('modelPickerBtn').addEventListener('click', openModelPicker);
  document.getElementById('settingsBtn').addEventListener('click', openSettings);

  // Sidebar
  document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);
  document.getElementById('sidebarNewBtn').addEventListener('click', () => { createNewChat(); closeSidebar(); });

  // Settings
  document.getElementById('settingsOverlay').addEventListener('click', closeSettings);
  document.getElementById('settingsCloseBtn').addEventListener('click', closeSettings);
  document.getElementById('clearAllBtn').addEventListener('click', clearAll);
  document.getElementById('systemPrompt').addEventListener('input', saveSettings);
  document.getElementById('fetchModelsBtn').addEventListener('click', fetchModels);
  document.getElementById('addModelBtn').addEventListener('click', addModelManual);

  // API edit
  document.getElementById('addApiBtn').addEventListener('click', () => openApiEdit(-1));
  document.getElementById('apiEditOverlay').addEventListener('click', closeApiEdit);
  document.getElementById('apiEditCancel').addEventListener('click', closeApiEdit);
  document.getElementById('apiEditSave').addEventListener('click', saveApiEdit);

  // Model picker
  document.getElementById('modelPicker').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModelPicker();
  });

  // Input
  const input = document.getElementById('msgInput');
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    // Toggle plus/send
    updatePlusBtn();
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
  });
  input.addEventListener('focus', () => setTimeout(() => scrollToBottom(), 300));
  input.addEventListener('blur', () => window.scrollTo(0, 0));

  // Paste image support
  document.addEventListener('paste', e => {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        e.preventDefault();
        const blob = item.getAsFile();
        const reader = new FileReader();
        reader.onload = ev => { attachedImages.push(ev.target.result); renderImagePreviews(); };
        reader.readAsDataURL(blob);
      }
    }
  });

  // Send / Stop
  document.getElementById('sendBtn')?.addEventListener('click', handleSend);

  // Camera
  document.getElementById('cameraBtn').addEventListener('click', () => {
    document.getElementById('cameraPicker').click();
  });
  document.getElementById('cameraPicker').addEventListener('change', function() {
    handleImages(this);
  });

  // Voice (long press)
  let voiceTimer = null;
  let voiceStarted = false;
  const voiceBtn = document.getElementById('voiceBtn');
  const voiceOverlay = document.getElementById('voiceOverlay');

  function startVoice(e) {
    e.preventDefault();
    voiceStarted = false;
    voiceTimer = setTimeout(() => {
      voiceStarted = true;
      voiceOverlay.classList.add('active');
      startRecording();
    }, 300);
  }
  function endVoice(e) {
    e && e.preventDefault();
    clearTimeout(voiceTimer);
    if (voiceStarted) {
      voiceOverlay.classList.remove('active');
      stopRecording();
      voiceStarted = false;
    }
  }
  voiceBtn.addEventListener('mousedown', startVoice);
  voiceBtn.addEventListener('mouseup', endVoice);
  voiceBtn.addEventListener('mouseleave', endVoice);
  voiceBtn.addEventListener('touchstart', startVoice, { passive: false });
  voiceBtn.addEventListener('touchend', endVoice, { passive: false });
  voiceBtn.addEventListener('touchcancel', endVoice, { passive: false });

  // Plus menu / Send
  const plusBtn = document.getElementById('plusBtn');
  const plusMenu = document.getElementById('plusMenu');
  plusBtn.addEventListener('click', () => {
    const hasContent = document.getElementById('msgInput').value.trim().length > 0 || attachedImages.length > 0;
    if (isStreaming || hasContent) {
      handleSend();
    } else {
      plusMenu.classList.toggle('open');
    }
  });
  document.addEventListener('click', e => {
    if (!plusMenu.contains(e.target) && e.target !== plusBtn && !plusBtn.contains(e.target)) {
      plusMenu.classList.remove('open');
    }
  });
  document.getElementById('plusAlbum').addEventListener('click', () => {
    plusMenu.classList.remove('open');
    document.getElementById('imgPicker').click();
  });
  document.getElementById('plusFile').addEventListener('click', () => {
    plusMenu.classList.remove('open');
    document.getElementById('filePicker').click();
  });
  document.getElementById('imgPicker').addEventListener('change', function() { handleImages(this); });
  document.getElementById('filePicker').addEventListener('change', function() { handleFile(this); });
}

// ==================== Data ====================
function loadData() {
  const saved = localStorage.getItem('chat_conversations');
  if (saved) {
    try { conversations = JSON.parse(saved); } catch { conversations = []; }
  }
  // Migrate old format
  const oldMsgs = localStorage.getItem('chat_messages');
  if (oldMsgs && conversations.length === 0) {
    try {
      const msgs = JSON.parse(oldMsgs);
      if (msgs.length > 0) {
        const conv = makeConv();
        conv.messages = msgs;
        conv.title = getConvTitle(msgs);
        conversations.unshift(conv);
        saveData();
        localStorage.removeItem('chat_messages');
      }
    } catch {}
  }
  const s = JSON.parse(localStorage.getItem('chat_settings') || '{}');
  document.getElementById('systemPrompt').value = s.systemPrompt || '';
  currentModel = s.currentModel || '';

  // Migrate model list from string to array
  if (typeof s.modelList === 'string' && s.modelList) {
    enabledModels = s.modelList.split('\n').map(m => m.trim()).filter(Boolean);
  } else {
    enabledModels = s.enabledModels || [];
  }

  // Migrate old single API to multi-API
  if (s.apiUrl && !s.apiConfigs) {
    apiConfigs = [{ name: '中转站1', url: s.apiUrl, key: s.apiKey || '' }];
    activeApiIndex = 0;
  } else {
    apiConfigs = s.apiConfigs || [];
    activeApiIndex = s.activeApiIndex || 0;
  }
  if (apiConfigs.length === 0) {
    apiConfigs = [{ name: '中转站1', url: '', key: '' }];
  }
  if (activeApiIndex >= apiConfigs.length) activeApiIndex = 0;

  // Default model
  if (enabledModels.length === 0) {
    enabledModels = ['claude-opus-4-6'];
  }
  if (!currentModel || !enabledModels.includes(currentModel)) {
    currentModel = enabledModels[0];
  }

  updateModelName();
  renderApiList();

  if (conversations.length === 0) {
    createNewChat();
  } else {
    currentConvId = conversations[0].id;
    renderSidebar();
    renderMessages();
  }
}

function saveData() {
  localStorage.setItem('chat_conversations', JSON.stringify(conversations));
}

function saveSettings() {
  localStorage.setItem('chat_settings', JSON.stringify({
    apiConfigs,
    activeApiIndex,
    enabledModels,
    systemPrompt: document.getElementById('systemPrompt').value.trim(),
    currentModel
  }));
}

function getActiveApi() {
  return apiConfigs[activeApiIndex] || { url: '', key: '' };
}

function makeConv() {
  return {
    id: 'c' + Date.now() + Math.random().toString(36).slice(2,6),
    title: '新对话',
    messages: [],
    created: Date.now(),
    updated: Date.now()
  };
}

function getConvTitle(msgs) {
  const first = msgs.find(m => m.role === 'user' && m.content);
  if (!first) return '新对话';
  return first.content.slice(0, 30).replace(/\n/g, ' ');
}

function getCurrentConv() {
  return conversations.find(c => c.id === currentConvId);
}

// ==================== Conversations ====================
function createNewChat() {
  const conv = makeConv();
  conversations.unshift(conv);
  currentConvId = conv.id;
  attachedImages = [];
  saveData();
  renderSidebar();
  renderMessages();
  renderImagePreviews();
}

function switchConv(id) {
  if (isStreaming) stopStream();
  currentConvId = id;
  attachedImages = [];
  renderSidebar();
  renderMessages();
  renderImagePreviews();
}

function deleteConv(id, e) {
  e.stopPropagation();
  conversations = conversations.filter(c => c.id !== id);
  if (currentConvId === id) {
    if (conversations.length === 0) createNewChat();
    else switchConv(conversations[0].id);
  }
  saveData();
  renderSidebar();
}

// ==================== Sidebar ====================
function openSidebar() {
  renderSidebar();
  document.getElementById('sidebarOverlay').classList.add('open');
  document.getElementById('sidebar').classList.add('open');
}
function closeSidebar() {
  document.getElementById('sidebarOverlay').classList.remove('open');
  document.getElementById('sidebar').classList.remove('open');
}

function renderSidebar() {
  const list = document.getElementById('sidebarList');
  if (conversations.length === 0) {
    list.innerHTML = '<div class="sidebar-empty">暂无对话</div>';
    return;
  }
  list.innerHTML = conversations.map(c => {
    const isActive = c.id === currentConvId;
    const time = formatTime(c.updated);
    const title = c.title || '新对话';
    return `<div class="sidebar-item${isActive ? ' active' : ''}" data-id="${c.id}">
      <div class="sidebar-item-info">
        <div class="sidebar-item-title">${escapeHtml(title)}</div>
        <div class="sidebar-item-time">${time}</div>
      </div>
      <button class="sidebar-item-delete" data-delete="${c.id}">✕</button>
    </div>`;
  }).join('');

  // Bind events
  list.querySelectorAll('.sidebar-item').forEach(el => {
    el.addEventListener('click', () => {
      switchConv(el.dataset.id);
      closeSidebar();
    });
  });
  list.querySelectorAll('.sidebar-item-delete').forEach(el => {
    el.addEventListener('click', e => deleteConv(el.dataset.delete, e));
  });
}

function formatTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return Math.floor(diff/60000) + '分钟前';
  if (diff < 86400000) return Math.floor(diff/3600000) + '小时前';
  return (d.getMonth()+1) + '/' + d.getDate() + ' ' + d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

// ==================== Settings ====================
function openSettings() {
  renderApiList();
  renderModelList();
  document.getElementById('settingsOverlay').classList.add('open');
  document.getElementById('settingsPanel').classList.add('open');
}
function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('open');
  document.getElementById('settingsPanel').classList.remove('open');
}

// ==================== API List ====================
function renderApiList() {
  const container = document.getElementById('apiListContainer');
  container.innerHTML = apiConfigs.map((api, i) => {
    const isActive = i === activeApiIndex;
    const shortUrl = api.url ? api.url.replace(/^https?:\/\//, '').slice(0, 30) : '未配置';
    return `<div class="api-card${isActive ? ' active' : ''}" data-api-index="${i}">
      <div class="api-card-top">
        <div class="api-card-name">
          ${escapeHtml(api.name || '通道' + (i+1))}
          ${isActive ? '<span class="api-card-badge">当前</span>' : ''}
        </div>
        <div class="api-card-actions">
          <button class="api-card-btn" data-edit-api="${i}" title="编辑">✏️</button>
          ${apiConfigs.length > 1 ? `<button class="api-card-btn" data-delete-api="${i}" title="删除">🗑</button>` : ''}
        </div>
      </div>
      <div class="api-card-url">${escapeHtml(shortUrl)}</div>
      <div class="api-card-balance" id="balance-${i}">
        <span style="color:var(--text2)">余额: --</span>
      </div>
    </div>`;
  }).join('');

  // Bind events
  container.querySelectorAll('.api-card').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.closest('[data-edit-api]') || e.target.closest('[data-delete-api]')) return;
      const idx = parseInt(el.dataset.apiIndex);
      activeApiIndex = idx;
      saveSettings();
      renderApiList();
    });
  });
  container.querySelectorAll('[data-edit-api]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      openApiEdit(parseInt(el.dataset.editApi));
    });
  });
  container.querySelectorAll('[data-delete-api]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const idx = parseInt(el.dataset.deleteApi);
      apiConfigs.splice(idx, 1);
      if (activeApiIndex >= apiConfigs.length) activeApiIndex = Math.max(0, apiConfigs.length - 1);
      saveSettings();
      renderApiList();
    });
  });

  // Check balances
  apiConfigs.forEach((api, i) => {
    if (api.url && api.key) checkBalance(i);
  });
}

// ==================== API Edit ====================
function openApiEdit(index) {
  editingApiIndex = index;
  const isEdit = index >= 0;
  document.getElementById('apiEditTitle').textContent = isEdit ? '编辑通道' : '添加通道';
  if (isEdit) {
    const api = apiConfigs[index];
    document.getElementById('apiEditName').value = api.name || '';
    document.getElementById('apiEditUrl').value = api.url || '';
    document.getElementById('apiEditKey').value = api.key || '';
  } else {
    document.getElementById('apiEditName').value = '';
    document.getElementById('apiEditUrl').value = '';
    document.getElementById('apiEditKey').value = '';
  }
  document.getElementById('apiEditOverlay').classList.add('open');
  document.getElementById('apiEditSheet').classList.add('open');
}
function closeApiEdit() {
  document.getElementById('apiEditOverlay').classList.remove('open');
  document.getElementById('apiEditSheet').classList.remove('open');
}
function saveApiEdit() {
  const name = document.getElementById('apiEditName').value.trim() || '中转站';
  const url = document.getElementById('apiEditUrl').value.trim();
  const key = document.getElementById('apiEditKey').value.trim();
  if (!url) { showToast('请填写 API 地址'); return; }
  if (editingApiIndex >= 0) {
    apiConfigs[editingApiIndex] = { name, url, key };
  } else {
    apiConfigs.push({ name, url, key });
    activeApiIndex = apiConfigs.length - 1;
  }
  saveSettings();
  renderApiList();
  closeApiEdit();
  showToast('已保存');
}

// ==================== Balance Check ====================
async function checkBalance(index) {
  const api = apiConfigs[index];
  if (!api || !api.url || !api.key) return;
  const el = document.getElementById(`balance-${index}`);
  if (!el) return;
  el.innerHTML = '<span style="color:var(--text2)">余额: 查询中...</span>';

  const baseUrl = api.url.replace(/\/+$/, '');

  // Try OpenAI billing endpoint
  try {
    const resp = await fetch(`${baseUrl}/dashboard/billing/credit_grants`, {
      headers: { 'Authorization': `Bearer ${api.key}` },
      signal: AbortSignal.timeout(5000)
    });
    if (resp.ok) {
      const data = await resp.json();
      const total = data.total_granted || 0;
      const used = data.total_used || 0;
      const remain = (total - used).toFixed(2);
      const cls = parseFloat(remain) < 10 ? 'balance-low' : 'balance-ok';
      el.innerHTML = `<span class="${cls}">余额: $${remain}</span>`;
      return;
    }
  } catch {}

  // Try v1/user/balance (common for Chinese relays)
  try {
    const resp = await fetch(`${baseUrl}/user/balance`, {
      headers: { 'Authorization': `Bearer ${api.key}` },
      signal: AbortSignal.timeout(5000)
    });
    if (resp.ok) {
      const data = await resp.json();
      const balance = data.balance ?? data.available_balance ?? data.total_balance;
      if (balance !== undefined) {
        const b = parseFloat(balance);
        const cls = b < 10 ? 'balance-low' : 'balance-ok';
        el.innerHTML = `<span class="${cls}">余额: ¥${b.toFixed(2)}</span>`;
        return;
      }
    }
  } catch {}

  // If all fail, show connection status instead
  try {
    const resp = await fetch(`${baseUrl}/models`, {
      headers: { 'Authorization': `Bearer ${api.key}` },
      signal: AbortSignal.timeout(5000)
    });
    if (resp.ok) {
      el.innerHTML = '<span style="color:#34c759">状态: 可用</span>';
    } else {
      el.innerHTML = `<span class="balance-err">状态: ${resp.status}</span>`;
    }
  } catch {
    el.innerHTML = '<span class="balance-err">状态: 无法连接</span>';
  }
}

// ==================== Model List ====================
function renderModelList() {
  const container = document.getElementById('modelListContainer');
  if (enabledModels.length === 0) {
    container.innerHTML = '<div class="model-list-empty">点击「自动获取」或「手动添加」添加模型</div>';
    return;
  }
  container.innerHTML = enabledModels.map((m, i) => `
    <div class="model-check-item checked" data-model-idx="${i}">
      <div class="model-check-box">✓</div>
      <span class="model-check-name">${escapeHtml(m)}</span>
      <button class="model-check-delete" data-del-model="${i}">✕</button>
    </div>
  `).join('');

  container.querySelectorAll('.model-check-item').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.closest('[data-del-model]')) return;
      el.classList.toggle('checked');
      // Update enabledModels based on checked state
      const checkedEls = container.querySelectorAll('.model-check-item.checked');
      enabledModels = Array.from(checkedEls).map(c => {
        const idx = parseInt(c.dataset.modelIdx);
        return enabledModels[idx];
      }).filter(Boolean);
      // If unchecked items remain, we need full rebuild
      rebuildEnabledModels();
    });
  });
  container.querySelectorAll('[data-del-model]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      enabledModels.splice(parseInt(el.dataset.delModel), 1);
      if (currentModel && !enabledModels.includes(currentModel)) {
        currentModel = enabledModels[0] || '';
        updateModelName();
      }
      saveSettings();
      renderModelList();
    });
  });
}

function rebuildEnabledModels() {
  const container = document.getElementById('modelListContainer');
  const checkedEls = container.querySelectorAll('.model-check-item.checked');
  const checkedNames = new Set();
  checkedEls.forEach(el => {
    const name = el.querySelector('.model-check-name')?.textContent;
    if (name) checkedNames.add(name);
  });
  enabledModels = enabledModels.filter(m => checkedNames.has(m));
  if (currentModel && !enabledModels.includes(currentModel)) {
    currentModel = enabledModels[0] || '';
    updateModelName();
  }
  saveSettings();
}

async function fetchModels() {
  const api = getActiveApi();
  if (!api.url || !api.key) {
    showToast('请先配置当前通道的 API 地址和 Key');
    return;
  }
  const btn = document.getElementById('fetchModelsBtn');
  btn.textContent = '获取中...';
  btn.disabled = true;

  try {
    const baseUrl = api.url.replace(/\/+$/, '');
    let resp;
    let text;

    // Try fetch with CORS mode first
    try {
      resp = await fetch(`${baseUrl}/models`, {
        headers: { 'Authorization': `Bearer ${api.key}` },
        signal: AbortSignal.timeout(10000)
      });
      text = await resp.text();
    } catch (fetchErr) {
      throw new Error('not_supported');
    }

    if (text && text.startsWith('<')) {
      throw new Error('not_supported');
    }

    let data;
    try { data = JSON.parse(text); } catch { throw new Error('返回非 JSON: ' + text.slice(0,100)); }

    let models = [];
    if (data.data && Array.isArray(data.data)) {
      models = data.data.map(m => typeof m === 'string' ? m : m.id).filter(Boolean);
    }
    if (models.length === 0 && data.models && Array.isArray(data.models)) {
      models = data.models.map(m => typeof m === 'string' ? m : m.id).filter(Boolean);
    }
    if (models.length === 0 && Array.isArray(data)) {
      models = data.map(m => typeof m === 'string' ? m : m.id).filter(Boolean);
    }

    if (models.length === 0) {
      throw new Error('not_supported');
    }

    const priority = ['claude', 'gpt-4', 'gpt-3', 'gemini', 'deepseek'];
    models.sort((a, b) => {
      const ai = priority.findIndex(p => a.toLowerCase().includes(p));
      const bi = priority.findIndex(p => b.toLowerCase().includes(p));
      if (ai !== bi) return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
      return a.localeCompare(b);
    });

    enabledModels = models;
    if (!currentModel && models.length > 0) {
      currentModel = models[0];
      updateModelName();
    }
    saveSettings();
    renderModelList();
    showToast(`获取到 ${models.length} 个模型`);
  } catch (e) {
    // Any failure → show common models in settings
    showCommonModelsInSettings();
  } finally {
    btn.textContent = '自动获取模型';
    btn.disabled = false;
  }
}

function addModelManual() {
  const name = prompt('输入模型名称（如 claude-opus-4-6）:');
  if (!name || !name.trim()) return;
  const m = name.trim();
  if (!enabledModels.includes(m)) {
    enabledModels.push(m);
    if (!currentModel) {
      currentModel = m;
      updateModelName();
    }
    saveSettings();
    renderModelList();
  }
}

// ==================== Chat ====================
function renderMessages() {
  const conv = getCurrentConv();
  const area = document.getElementById('chatArea');
  if (!conv || conv.messages.length === 0) {
    area.innerHTML = '';
    return;
  }
  area.innerHTML = conv.messages.map((m, i) => renderMsg(m, i, conv.messages.length)).join('');
  scrollToBottom();
}

function renderMsg(m, index, total) {
  const isUser = m.role === 'user';
  let content = '';
  if (m.images && m.images.length) {
    content += m.images.map(src => `<img class="msg-img" src="${src}">`).join('');
  }
  if (m.content) content += formatText(m.content);
  const actions = !isUser && index === total - 1 ? `
    <div class="msg-actions">
      <button class="msg-action-btn" data-copy="${index}">复制</button>
    </div>` : '';
  const html = `<div class="msg ${m.role}">
    <div class="msg-avatar">${isUser ? '我' : '✦'}</div>
    <div><div class="msg-bubble">${content}</div>${actions}</div>
  </div>`;
  return html;
}

// Bind copy buttons via delegation
document.addEventListener('click', e => {
  if (e.target.dataset.copy !== undefined) {
    const conv = getCurrentConv();
    if (conv) {
      navigator.clipboard.writeText(conv.messages[e.target.dataset.copy]?.content || '').then(() => showToast('已复制'));
    }
  }
});

function formatText(text) {
  if (!text) return '';
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${escapeHtml(code.trim())}</code></pre>`);
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  text = text.split('\n\n').map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
  return text;
}

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function scrollToBottom() {
  const area = document.getElementById('chatArea');
  requestAnimationFrame(() => { area.scrollTop = area.scrollHeight; });
}

// ==================== Image / File ====================
function handleImages(input) {
  Array.from(input.files).forEach(file => {
    const reader = new FileReader();

  else {

      <img class="input-img-thumb" src="${src}">
      <button class="input-img-remove" data-rmimg="${i}">✕</button>
    </div>`).join('');

}
document.addEventListener('click', e => {
  if (e.target.dataset.rmimg !== undefined) {
    attachedImages.splice(parseInt(e.target.dataset.rmimg), 1);
    renderImagePreviews();
  }
});

function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('msgInput').value = `[文件: ${file.name}]\n\n${e.target.result}`;
    document.getElementById('msgInput').style.height = 'auto';
  };
  reader.readAsText(file);
  input.value = '';
}

// ==================== Send ====================
async function handleSend() {
  if (isStreaming) { stopStream(); return; }

  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text && attachedImages.length === 0) return;

  const activeApi = getActiveApi();
  const apiUrl = activeApi.url;
  const apiKey = activeApi.key;
  if (!apiUrl || !apiKey) { showToast('请先在设置中填写 API 地址和 Key'); openSettings(); return; }
  if (!currentModel) { showToast('请先选择模型'); openModelPicker(); return; }

  const conv = getCurrentConv();
  if (!conv) return;

  const userMsg = { role: 'user', content: text };
  if (attachedImages.length > 0) userMsg.images = [...attachedImages];
  conv.messages.push(userMsg);

  if (conv.messages.filter(m => m.role === 'user').length === 1) {
    conv.title = getConvTitle(conv.messages);
  }
  conv.updated = Date.now();

  input.value = '';
  input.style.height = 'auto';
  attachedImages = [];
  renderImagePreviews();
  saveData();
  renderMessages();
  renderSidebar();

  isStreaming = true;
  updateSendBtn();
  abortController = new AbortController();

  // Build request messages
  const reqMessages = [];
  const sysPrompt = document.getElementById('systemPrompt').value.trim();
  if (sysPrompt) reqMessages.push({ role: 'system', content: sysPrompt });
  for (const m of conv.messages) {
    if (m.images && m.images.length > 0) {
      const content = [];
      if (m.content) content.push({ type: 'text', text: m.content });
      for (const img of m.images) content.push({ type: 'image_url', image_url: { url: img } });
      reqMessages.push({ role: m.role, content });
    } else {
      reqMessages.push({ role: m.role, content: m.content });
    }
  }

  // Try APIs with failover
  const triedIndices = new Set();
  let lastError = null;
  let resp = null;
  let usedApiIndex = activeApiIndex;
  let debugInfo = '';

  for (let attempt = 0; attempt < apiConfigs.length; attempt++) {
    let idx = (activeApiIndex + attempt) % apiConfigs.length;
    if (triedIndices.has(idx)) continue;
    triedIndices.add(idx);
    const api = apiConfigs[idx];
    if (!api.url || !api.key) continue;

    const fetchUrl = `${api.url.replace(/\/+$/, '')}/chat/completions`;
    const fetchBody = JSON.stringify({ model: currentModel, messages: reqMessages, stream: true });

    try {
      resp = await fetch(fetchUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain', 'Authorization': `Bearer ${api.key}` },
        body: fetchBody,
        signal: abortController.signal
      });
      if (resp.ok) {
        usedApiIndex = idx;
        if (idx !== activeApiIndex) {
          activeApiIndex = idx;
          saveSettings();
          showToast(`已切换到 ${api.name}`);
        }
        break;
      }
      const errBody = await resp.text().catch(() => '');
      debugInfo = `HTTP ${resp.status}: ${errBody.slice(0,200)}`;
      lastError = new Error(debugInfo);
      resp = null;
    } catch (e) {
      if (e.name === 'AbortError') throw e;
      debugInfo = e.message;
      // Check if it's a CORS error
      if (e.message.includes('Failed to fetch') || e.message.includes('NetworkError') || e.message.includes('CORS')) {
        debugInfo = `跨域被拒绝: ${api.url}`;
      }
      lastError = new Error(debugInfo);
      resp = null;
    }
  }

  if (!resp) {
    isStreaming = false;
    updateSendBtn();
    conv.messages.push({ role: 'assistant', content: `请求失败：${lastError?.message || '所有 API 通道都无法连接'}\n\n如果显示"跨域被拒绝"，说明此中转站不支持从网页直接调用，需要用 Cherry Studio 等客户端。` });
    saveData();
    renderMessages();
    return;
  }

  // Check if response has a body
  if (!resp.body) {
    // No streaming body - try non-streaming fallback
    try {
      const text = await resp.text();
      if (text) {
        try {
          const json = JSON.parse(text);
          const content = json.choices?.[0]?.message?.content;
          if (content) {
            conv.messages.push({ role: 'assistant', content });
            saveData(); renderMessages();
            return;
          }
        } catch {}
        conv.messages.push({ role: 'assistant', content: `API 返回了非标准响应:\n\n\`\`\`\n${text.slice(0, 500)}\n\`\`\`` });
      } else {
        conv.messages.push({ role: 'assistant', content: `API 返回了空响应 (HTTP ${resp.status})。当前模型: ${currentModel}` });
      }
    } catch (e) {
      conv.messages.push({ role: 'assistant', content: `读取响应失败: ${e.message}` });
    }
    saveData(); renderMessages();
    return;
  }

  try {
    conv.messages.push({ role: 'assistant', content: '' });
    saveData();
    renderMessages();

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let gotAnyContent = false;
    let rawDebug = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed) continue;
        if (trimmed.startsWith('data: ')) {
          const data = trimmed.slice(6);
          if (data === '[DONE]') continue;
          try {
            const delta = JSON.parse(data).choices?.[0]?.delta?.content;
            if (delta) {
              gotAnyContent = true;
              conv.messages[conv.messages.length - 1].content += delta;
              const area = document.getElementById('chatArea');
              const msgEl = area.querySelector('.msg.assistant:last-child');
              if (msgEl) {
                msgEl.querySelector('.msg-bubble').innerHTML = formatText(conv.messages[conv.messages.length - 1].content);
              }
              scrollToBottom();
            }
          } catch {}
        }
      }
    }

    // If no streaming content, try reading full response
    if (!gotAnyContent && buffer) {
      try {
        const json = JSON.parse(buffer);
        const content = json.choices?.[0]?.message?.content;
        if (content) {
          conv.messages[conv.messages.length - 1].content = content;
          gotAnyContent = true;
        } else {
          // Show raw response for debugging
          conv.messages[conv.messages.length - 1].content = 'API 返回了无法解析的内容:\n\n```\n' + buffer.slice(0, 500) + '\n```';
          gotAnyContent = true;
        }
      } catch {
        conv.messages[conv.messages.length - 1].content = 'API 返回了非 JSON 内容:\n\n```\n' + buffer.slice(0, 500) + '\n```';
        gotAnyContent = true;
      }
    }

    if (!gotAnyContent) {
      // Streaming returned nothing - try non-streaming as fallback
      const activeApi = apiConfigs[usedApiIndex];
      const retryUrl = `${activeApi.url.replace(/\/+$/, '')}/chat/completions`;
      try {
        const retryResp = await fetch(retryUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain', 'Authorization': `Bearer ${activeApi.key}` },
          body: JSON.stringify({ model: currentModel, messages: reqMessages, stream: false }),
          signal: AbortSignal.timeout(30000)
        });
        if (retryResp.ok) {
          const retryText = await retryResp.text();
          if (retryText) {
            try {
              const json = JSON.parse(retryText);
              const content = json.choices?.[0]?.message?.content;
              if (content) {
                conv.messages[conv.messages.length - 1].content = content;
                gotAnyContent = true;
              } else {
                conv.messages[conv.messages.length - 1].content = '非流式返回但无内容:\n\n```\n' + retryText.slice(0, 500) + '\n```';
                gotAnyContent = true;
              }
            } catch {
              conv.messages[conv.messages.length - 1].content = '非流式返回非JSON:\n\n```\n' + retryText.slice(0, 500) + '\n```';
              gotAnyContent = true;
            }
          }
        } else {
          conv.messages[conv.messages.length - 1].content = `非流式请求失败 HTTP ${retryResp.status}。当前模型: ${currentModel}\n请检查模型名称和 API 地址。`;
          gotAnyContent = true;
        }
      } catch (retryE) {
        conv.messages[conv.messages.length - 1].content = `流式和非流式均无返回。\n流式: 空响应体\n非流式: ${retryE.message}\n当前模型: ${currentModel}\n请检查 API 地址和模型名称。`;
        gotAnyContent = true;
      }
    }
    saveData();
  } catch (e) {
    if (e.name !== 'AbortError') {
      if (conv.messages.length > 0 && conv.messages[conv.messages.length - 1].role === 'assistant' && !conv.messages[conv.messages.length - 1].content) {
        conv.messages.pop();
      }
      showToast(e.message || '请求失败');
    }
    saveData();
  } finally {
    isStreaming = false;
    abortController = null;
    renderMessages();
    updateSendBtn();
  }
}

function stopStream() { if (abortController) abortController.abort(); }

function updateSendBtn() {
  updatePlusBtn();
}

// ==================== Voice Recording ====================
let recognition = null;
function startRecording() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    showToast('你的浏览器不支持语音输入');
    document.getElementById('voiceOverlay').classList.remove('active');
    return;
  }
  recognition = new SpeechRecognition();
  recognition.lang = 'zh-CN';
  recognition.continuous = true;
  recognition.interimResults = true;
  let finalText = '';
  recognition.onresult = e => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        finalText += e.results[i][0].transcript;
      } else {
        interim += e.results[i][0].transcript;
      }
    }
    const input = document.getElementById('msgInput');
    input.value = finalText + interim;
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  };
  recognition.onerror = () => {
    document.getElementById('voiceOverlay').classList.remove('active');
  };
  recognition.onend = () => {
    document.getElementById('voiceOverlay').classList.remove('active');
  };
  recognition.start();
}
function stopRecording() {
  if (recognition) {
    try { recognition.stop(); } catch {}
    recognition = null;
  }
}
